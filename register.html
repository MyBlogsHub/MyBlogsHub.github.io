<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBlogsHub – sign up</title>
  <link rel="stylesheet" href="register-style.css">
</head>
<body class="light-theme">
  <header class="site-header">
    <div class="container header-flex">
      <div class="logo">MyBlogsHub</div>
      <nav class="navbar">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="#">Blogs</a></li>
          <li><a href="#">Categories</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html" class="active">Sign Up</a></li>
          <li><button class="theme-toggle" id="themeToggle">Dark</button></li>
        </ul>
      </nav>
      <div class="mobile-toggle" id="mobileToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <main class="register-main">
    <div class="container register-container">
      <div class="register-card">
        <h2>Create account</h2>
        <p class="register-sub">Join MyBlogsHub today</p>

        <form id="registerForm" class="register-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="register-btn">Sign up</button>
          <p class="form-footer">
            Already have an account? <a href="login.html">Log in</a>
          </p>
        </form>

        <div id="registerMessage" class="register-message"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© 2025 MyBlogsHub — simple, useful, human.</p>
      <p class="domain">myblogshub.github.io</p>
    </div>
  </footer>

  <script src="register-script.js"></script>
</body>
</html>
